spring.profiles.active = prod
spring.application.name=gptserver

spring.datasource.type = com.zaxxer.hikari.HikariDataSource
spring.datasource.url = jdbc:mysql://127.0.0.1:4306/zgpt?&characterEncoding=UTF-8&autoReconnect=true&allowMultiQueries=true&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
spring.datasource.hikari.pool-name = HikariCP
spring.datasource.hikari.driver-class-name = com.mysql.cj.jdbc.Driver
spring.datasource.hikari.username = root
spring.datasource.hikari.password = 123456
spring.datasource.hikari.minimum-idle = 10
spring.datasource.hikari.maximum-pool-size = 10
spring.datasource.hikari.idle-timeout= 600000
spring.datasource.hikari.max-lifetime = 1800000
spring.datasource.hikari.connection-timeout = 10000
spring.datasource.hikari.connection-test-query = SELECT 1

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

